<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nouveautés | Sen Vaisselle</title>
<meta name="description" content="Découvrez les derniers arrivages de vaisselle, ustensiles de cuisine et articles ménagers chez Sen Vaisselle.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://senvaisselle.com/pages/nouveautes.html">
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="sv-navbar"></div>

<header class="sv-hero" style="padding:48px 0 40px;">
  <div class="container-xl position-relative">
    <span class="sv-hero-eyebrow">Fraîchement arrivé</span>
    <h1 style="font-size:clamp(2rem,3.4vw,2.8rem);">Nos nouveautés</h1>
    <p class="lead mb-0">Les derniers produits ajoutés à la boutique Sen Vaisselle.</p>
  </div>
</header>

<section class="sv-section pt-4">
  <div class="container-xl">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <span class="text-muted small" id="resultsCount">Chargement...</span>
    </div>
    <div class="row g-4" id="productsGrid"></div>
  </div>
</section>

<div id="sv-footer"></div>
<div id="sv-wa-float"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script>window.SV_BASE = "../"; window.SV_PAGE = "nouveautes";</script>
<script type="module" src="../js/components.js"></script>
<script type="module">
import { fetchProducts, renderProductCard, renderSkeletonCards, renderEmptyState, renderErrorState } from "../js/products.js";
import { fetchCategories } from "../js/categories.js";
const grid = document.getElementById("productsGrid");
const countEl = document.getElementById("resultsCount");
grid.innerHTML = renderSkeletonCards(8);
await fetchCategories();
fetchProducts({ isNew: true }).then(products => {
  if (products === null) { grid.innerHTML = renderErrorState(); countEl.textContent = ""; return; }
  countEl.textContent = `${products.length} nouveauté${products.length>1?"s":""}`;
  grid.innerHTML = products.length ? products.map(renderProductCard).join("") : renderEmptyState("Aucune nouveauté pour le moment. Revenez bientôt !");
});
</script>
</body>
</html>
