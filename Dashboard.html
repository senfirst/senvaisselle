<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tableau de bord | Admin Sen Vaisselle</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>

<div class="admin-shell">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="brand"><span class="plate-mark"></span> Sen Vaisselle</div>
    <a href="dashboard.html" class="nav-item active"><i class="fa-solid fa-gauge"></i> Tableau de bord</a>
    <a href="produits.html" class="nav-item"><i class="fa-solid fa-box"></i> Produits</a>
    <a href="../index.html" class="nav-item" target="_blank"><i class="fa-solid fa-arrow-up-right-from-square"></i> Voir la boutique</a>
    <a href="#" id="logoutLink" class="nav-item"><i class="fa-solid fa-right-from-bracket"></i> Déconnexion</a>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <div>
        <button class="btn d-lg-none mb-2" id="sidebarToggle" style="border:1px solid var(--line);border-radius:10px;">
          <i class="fa-solid fa-bars"></i>
        </button>
        <h1 class="font-display" style="font-size:1.7rem;color:var(--navy);margin:0;">Tableau de bord</h1>
        <p class="text-muted small mb-0" id="welcomeMsg">Bienvenue</p>
      </div>
      <a href="produit-form.html" class="btn-sv-primary"><i class="fa-solid fa-plus me-1"></i> Ajouter un produit</a>
    </div>

    <div class="row g-3 mb-4" id="kpiRow">
      <div class="col-6 col-lg-3"><div class="kpi-card"><div class="kpi-num skel" style="height:28px;width:50%;border-radius:6px;"></div><div class="kpi-label mt-2">Produits au total</div></div></div>
      <div class="col-6 col-lg-3"><div class="kpi-card"><div class="kpi-num skel" style="height:28px;width:50%;border-radius:6px;"></div><div class="kpi-label mt-2">En stock</div></div></div>
      <div class="col-6 col-lg-3"><div class="kpi-card"><div class="kpi-num skel" style="height:28px;width:50%;border-radius:6px;"></div><div class="kpi-label mt-2">En promotion</div></div></div>
      <div class="col-6 col-lg-3"><div class="kpi-card"><div class="kpi-num skel" style="height:28px;width:50%;border-radius:6px;"></div><div class="kpi-label mt-2">Nouveautés</div></div></div>
    </div>

    <div class="admin-card">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="h6 mb-0">Derniers produits ajoutés</h2>
        <a href="produits.html" class="small">Voir tous les produits <i class="fa-solid fa-arrow-right ms-1"></i></a>
      </div>
      <div id="recentList"><p class="text-muted small mb-0">Chargement...</p></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module">
import { requireAuth, logoutAdmin } from "../js/admin-auth.js";
import { fetchAllProductsAdmin } from "../js/admin-products.js";
import { formatPrice, escapeText } from "../js/utils.js";
import { categoryName } from "../js/products.js";

document.getElementById("logoutLink").addEventListener("click", (e) => { e.preventDefault(); logoutAdmin(); });
document.getElementById("sidebarToggle")?.addEventListener("click", () => {
  document.getElementById("adminSidebar").classList.toggle("open");
});

requireAuth(async (user) => {
  document.getElementById("welcomeMsg").textContent = `Bienvenue, ${user.email}`;

  const products = await fetchAllProductsAdmin();

  const total = products.length;
  const inStock = products.filter(p => p.availability !== false && p.stock > 0).length;
  const promo = products.filter(p => p.promo).length;
  const nouveautes = products.filter(p => p.isNew).length;

  const kpis = [total, inStock, promo, nouveautes];
  document.querySelectorAll("#kpiRow .kpi-num").forEach((el, i) => {
    el.classList.remove("skel");
    el.style.cssText = "";
    el.textContent = kpis[i];
  });

  const recent = products.slice(0, 6);
  const list = document.getElementById("recentList");
  list.innerHTML = recent.length ? `
    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead><tr class="small text-muted"><th>Produit</th><th>Catégorie</th><th>Prix</th><th>Statut</th></tr></thead>
        <tbody>
          ${recent.map(p => `
            <tr>
              <td class="fw-semibold">${escapeText(p.name)}</td>
              <td class="small text-muted">${escapeText(categoryName(p.categoryId))}</td>
              <td class="small">${formatPrice(p.price)}</td>
              <td>${p.availability !== false && p.stock > 0
                ? '<span class="badge-status-on">En stock</span>'
                : '<span class="badge-status-off">Rupture</span>'}</td>
            </tr>`).join("")}
        </tbody>
      </table>
    </div>` : `<p class="text-muted small mb-0">Aucun produit pour le moment. <a href="produit-form.html">Ajoutez votre premier produit</a>.</p>`;
});
</script>
</body>
</html>
