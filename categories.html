<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catégories | Sen Vaisselle</title>
<meta name="description" content="Découvrez les 18 catégories de Sen Vaisselle : assiettes, verres, marmites, casseroles, décoration de table et bien plus.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://senvaisselle.com/pages/categories.html">
<link rel="icon" href="../images/favicon.svg" type="image/svg+xml">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="sv-navbar"></div>

<header class="sv-hero" style="padding:48px 0 40px;">
  <div class="container-xl position-relative">
    <span class="sv-hero-eyebrow">Explorer par univers</span>
    <h1 style="font-size:clamp(2rem,3.4vw,2.8rem);">Toutes les catégories</h1>
    <p class="lead mb-0">De la table au rangement, retrouvez chaque univers de la maison Sen Vaisselle.</p>
  </div>
</header>

<section class="sv-section pt-4">
  <div class="container-xl">
    <div class="row g-3" id="allCategories"></div>
  </div>
</section>

<div id="sv-footer"></div>
<div id="sv-wa-float"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script>window.SV_BASE = "../"; window.SV_PAGE = "categories";</script>
<script type="module" src="../js/components.js"></script>
<script type="module">
import { fetchCategories } from "../js/categories.js";
fetchCategories().then(categories => {
  document.getElementById("allCategories").innerHTML = categories.map(c => `
    <div class="col-6 col-md-4 col-lg-3" data-aos="fade-up">
      <a href="boutique.html?categorie=${c.id}" class="cat-card d-block">
        <div class="cat-icon"><i class="${c.icon || 'fa-solid fa-tag'}"></i></div>
        <h3>${c.name}</h3>
      </a>
    </div>`).join("");
});
</script>
</body>
</html>
